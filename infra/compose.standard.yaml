# Standard topology: single-node Mongo replica set + Oracle 26ai Free.
# Both engines pinned to identical Docker resource limits (matched to Oracle
# Free's hard caps: 2 CPU threads, 2 GB RAM, 12 GB user data per PDB).
#
# Per docs/02-infrastructure.md and IMPLEMENTATION-PLAN.md.

services:
  mongo-bench:
    image: mongodb/mongodb-community-server:8.2.2-ubuntu2404
    container_name: mongo-bench
    command:
      - "--replSet=bench"
      - "--bind_ip_all"
      - "--wiredTigerCacheSizeGB=1.5"
      - "--journalCommitInterval=100"
    cpus: "2.0"
    cpuset: "0-1"
    mem_limit: "4g"
    memswap_limit: "4g"
    mem_swappiness: 0
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 3s
      retries: 30

  oracle-bench:
    image: gvenzl/oracle-free:26-faststart
    container_name: oracle-bench
    cpus: "2.0"
    cpuset: "2-3"
    mem_limit: "4g"
    memswap_limit: "4g"
    mem_swappiness: 0
    shm_size: "2g"
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    environment:
      ORACLE_PWD: BenchPass2026
      ORACLE_DATABASE: FREEPDB1
      APP_USER: BENCH
      APP_USER_PASSWORD: BenchPass2026
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-bench.sql:/container-entrypoint-initdb.d/01-bench.sql:ro
      - ./oracle-statspack.sql:/container-entrypoint-initdb.d/02-statspack.sql:ro
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "echo 'select 1 from dual;' | sqlplus -L -S system/BenchPass2026@localhost/FREEPDB1 | grep -q '1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  mongo-data:
  oracle-data:
