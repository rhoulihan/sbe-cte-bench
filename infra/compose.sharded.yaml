# Sharded topology: 2-shard Mongo cluster (mongos + cfgsvr + shard1 in one
# container, shard2 in another) + Oracle 26ai Free.
#
# Both Mongo containers each get the standard 2-CPU / 4-GB limit (so the
# Mongo cluster has 2x the resources of the single Oracle container) — a
# documented fairness exception per docs/08-fairness-charter.md.
#
# Used by S06, S07-sharded, S14-V14c.

services:
  mongo-bench-shard1-router:
    build:
      context: .
      dockerfile: Dockerfile.mongo-shard-router
    image: sbe-cte-bench/mongo-shard-router:8.2.2
    container_name: mongo-bench-shard1-router
    cpus: "2.0"
    cpuset: "0-1"
    mem_limit: "4g"
    memswap_limit: "4g"
    mem_swappiness: 0
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - mongo-shard1-data:/data/shard1
      - mongo-cfg-data:/data/cfg
    ports:
      - "27017:27017"  # mongos
      - "27018:27018"  # shard1
      - "27019:27019"  # cfgsvr
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--port=27017", "--eval", "sh.status()"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo-bench-shard2:
    image: mongodb/mongodb-community-server:8.2.2-ubuntu2404
    container_name: mongo-bench-shard2
    command:
      - "--shardsvr"
      - "--replSet=shard2"
      - "--port=27018"
      - "--bind_ip_all"
      - "--wiredTigerCacheSizeGB=1.5"
      - "--journalCommitInterval=100"
    cpus: "2.0"
    cpuset: "4-5"
    mem_limit: "4g"
    memswap_limit: "4g"
    mem_swappiness: 0
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - mongo-shard2-data:/data/db
    ports:
      - "27028:27018"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--port=27018", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 3s
      retries: 30

  oracle-bench:
    image: gvenzl/oracle-free:26-faststart
    container_name: oracle-bench
    cpus: "2.0"
    cpuset: "2-3"
    mem_limit: "4g"
    memswap_limit: "4g"
    mem_swappiness: 0
    shm_size: "2g"
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    environment:
      ORACLE_PWD: BenchPass2026
      ORACLE_DATABASE: FREEPDB1
      APP_USER: BENCH
      APP_USER_PASSWORD: BenchPass2026
    volumes:
      - oracle-data-sharded:/opt/oracle/oradata
      - ./oracle-bench.sql:/container-entrypoint-initdb.d/01-bench.sql:ro
      - ./oracle-statspack.sql:/container-entrypoint-initdb.d/02-statspack.sql:ro
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "echo 'select 1 from dual;' | sqlplus -L -S system/BenchPass2026@localhost/FREEPDB1 | grep -q '1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  mongo-shard1-data:
  mongo-shard2-data:
  mongo-cfg-data:
  oracle-data-sharded:
